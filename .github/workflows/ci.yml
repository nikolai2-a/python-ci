name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # Линтер
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Укажите вашу версию

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check . --output-format=github

  # Тесты
  test:
    name: Test with pytest & coverage
    runs-on: ubuntu-latest
    needs: lint  # Запускается только после успешного lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report as artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # Сборка
  build:
  name: Build and Package
  runs-on: ubuntu-latest
  needs: test
  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    # Сборка Python-пакета
    - name: Build distribution package
      run: python -m build

    - name: Upload package as artifact
      uses: actions/upload-artifact@v4
      with:
        name: python-package-distributions
        path: dist/

    # Сборка Docker образа
    - name: Build Docker image
      run: docker build -t geometry-calculator:${{ github.sha }} .

    - name: Save Docker image as artifact
      run: |
        mkdir -p docker-output
        docker save geometry-calculator:${{ github.sha }} | gzip > docker-output/docker-image.tar.gz

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: docker-output/
